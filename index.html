        <h1>Aloitussivu</h1>
        <p>Aloitussivu kokoaa ikääntyneille selkeät ja turvalliset linkit arjen digipalveluihin, paikallisiin palveluihin, uutisiin ja digituen lähteisiin. Interaktiivinen linkkihakemisto tarvitsee JavaScriptin.</p>
        <h2>Usein kysytyt kysymykset</h2>
        <h3>Mikä Aloitussivu on?</h3>
        <p>Aloitussivu on selkeä linkkihakemisto ja arjen lähtöpiste verkkoon. Se kokoaa samaan näkymään turvallisia linkkejä, paikallisia palveluja, uutisia, säätietoja, huijausvaroituksia ja digituen lähteitä.</p>
        <h3>Kenelle Aloitussivu on tarkoitettu?</h3>
        <p>Aloitussivu on suunniteltu erityisesti ikääntyneille käyttäjille ja digiopastajille, jotka tarvitsevat rauhallisen, helppokäyttöisen ja saavutettavan tavan löytää arjen verkkopalvelut.</p>
        <h3>Mitä palveluja sivulta löytyy?</h3>
        <p>Sivulta löytyy linkkejä viranomaisasiointiin, terveyteen, pankki- ja talousasioihin, uutisiin, kulttuuriin, liikenteeseen, paikallisiin palveluihin, digiapuun ja yhteydenpitoon.</p>
        <h3>Voiko Aloitussivua käyttää ilman kirjautumista?</h3>
        <p>Kyllä. Aloitussivua voi käyttää ilman käyttäjätiliä. Käyttäjän omat asetukset ja suosikit tallennetaan pääosin käyttäjän omaan selaimeen.</p>
        <h3>Onko Aloitussivu saavutettava?</h3>
        <p>Aloitussivu on suunniteltu saavutettavaksi: sivulla on suuret painikkeet, tekstikoon säätö, selkeä rakenne, hyppylinkki pääsisältöön ja saavutettavuusseloste.</p>
